        <a href="admin-groups.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 text-sm font-medium">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>

          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>

      <div class="p-3 border-t border-gray-200 dark:border-gray-700">

    <!-- Main -->
    <main class="flex-1 overflow-y-auto">
      <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-4 flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold text-gray-900 dark:text-gray-100">그룹 관리</h1>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">상담 그룹 생성 및 상담사 배정</p>
        </div>
        <button onclick="document.getElementById('groupModal').classList.remove('hidden')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg px-4 py-2 transition-colors inline-flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          그룹 생성
        </button>
      </header>

      <div class="p-6">
        <!-- Group Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Group 1 -->
          <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
              <div>
                <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">기술지원팀</h3>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 mt-1">활성</span>
              </div>
              <button class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
              </button>
            </div>

              <div class="flex items-center gap-2 mb-3">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="text-sm text-gray-700 dark:text-gray-300">8명</span>
              </div>
              <!-- Members -->
              <div class="flex -space-x-2 mb-4">
                <div class="w-7 h-7 bg-indigo-100 dark:bg-indigo-900/50 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-indigo-600 dark:text-indigo-400">김</span></div>
                <div class="w-7 h-7 bg-green-100 dark:bg-green-900/50 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-green-600 dark:text-green-400">이</span></div>
                <div class="w-7 h-7 bg-amber-100 dark:bg-amber-900/50 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-amber-600 dark:text-amber-400">박</span></div>
                <div class="w-7 h-7 bg-gray-100 dark:bg-gray-700 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-gray-500 dark:text-gray-400">+5</span></div>
              </div>
              <div class="grid grid-cols-3 gap-2 text-center">
                <div><p class="text-lg font-bold text-green-600 dark:text-green-400">3</p><p class="text-xs text-gray-500">온라인</p></div>
                <div><p class="text-lg font-bold text-red-600 dark:text-red-400">2</p><p class="text-xs text-gray-500">상담중</p></div>
                <div><p class="text-lg font-bold text-gray-400">3</p><p class="text-xs text-gray-500">오프라인</p></div>
              </div>
            </div>
          </div>

          <!-- Group 2 -->
          <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
              <div>
                <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">영업팀</h3>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 mt-1">활성</span>
              </div>
              <button class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
              </button>
            </div>
            <div class="p-5">
              <div class="flex items-center gap-2 mb-3">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="text-sm text-gray-700 dark:text-gray-300">5명</span>
              </div>
              <div class="flex -space-x-2 mb-4">
                <div class="w-7 h-7 bg-pink-100 dark:bg-pink-900/50 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-pink-600 dark:text-pink-400">정</span></div>
                <div class="w-7 h-7 bg-blue-100 dark:bg-blue-900/50 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-blue-600 dark:text-blue-400">강</span></div>
                <div class="w-7 h-7 bg-gray-100 dark:bg-gray-700 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-gray-500 dark:text-gray-400">+3</span></div>
              </div>
              <div class="grid grid-cols-3 gap-2 text-center">
                <div><p class="text-lg font-bold text-green-600 dark:text-green-400">2</p><p class="text-xs text-gray-500">온라인</p></div>
                <div><p class="text-lg font-bold text-red-600 dark:text-red-400">1</p><p class="text-xs text-gray-500">상담중</p></div>
                <div><p class="text-lg font-bold text-gray-400">2</p><p class="text-xs text-gray-500">오프라인</p></div>
              </div>
            </div>
          </div>

          <!-- Group 3 -->
          <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
              <div>
                <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">CS팀</h3>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 mt-1">활성</span>
              </div>
              <button class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
              </button>
            </div>
            <div class="p-5">
              <div class="flex items-center gap-2 mb-3">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="text-sm text-gray-700 dark:text-gray-300">7명</span>
              </div>
              <div class="flex -space-x-2 mb-4">
                <div class="w-7 h-7 bg-purple-100 dark:bg-purple-900/50 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-purple-600 dark:text-purple-400">윤</span></div>
                <div class="w-7 h-7 bg-red-100 dark:bg-red-900/50 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-red-600 dark:text-red-400">한</span></div>
                <div class="w-7 h-7 bg-gray-100 dark:bg-gray-700 rounded-full border-2 border-white dark:border-gray-800 flex items-center justify-center"><span class="text-xs font-medium text-gray-500 dark:text-gray-400">+5</span></div>
              </div>
              <div class="grid grid-cols-3 gap-2 text-center">
                <div><p class="text-lg font-bold text-green-600 dark:text-green-400">4</p><p class="text-xs text-gray-500">온라인</p></div>
                <div><p class="text-lg font-bold text-red-600 dark:text-red-400">2</p><p class="text-xs text-gray-500">상담중</p></div>
                <div><p class="text-lg font-bold text-gray-400">1</p><p class="text-xs text-gray-500">오프라인</p></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Group Create Modal -->
  <div id="groupModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="fixed inset-0 bg-black/50" onclick="document.getElementById('groupModal').classList.add('hidden')"></div>
    <div class="relative bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 w-full max-w-md mx-4 p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">그룹 생성</h3>
        <button onclick="document.getElementById('groupModal').classList.add('hidden')" class="p-1 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">그룹명</label>
          <input type="text" placeholder="그룹 이름 입력" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2.5 text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:ring-2 focus:ring-indigo-500 outline-none transition-colors" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">상담사 배정</label>
          <div class="space-y-2 max-h-40 overflow-y-auto bg-gray-50 dark:bg-gray-700/50 rounded-lg p-3">
            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" /><span class="text-sm text-gray-700 dark:text-gray-300">김상담</span></label>
            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" /><span class="text-sm text-gray-700 dark:text-gray-300">이지원</span></label>
            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" /><span class="text-sm text-gray-700 dark:text-gray-300">박영호</span></label>
            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" /><span class="text-sm text-gray-700 dark:text-gray-300">최수진</span></label>
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="document.getElementById('groupModal').classList.add('hidden')" class="flex-1 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-lg px-4 py-2.5 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">취소</button>
          <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg px-4 py-2.5 transition-colors">생성</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('darkToggle');
    const html = document.documentElement;
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
    }
    toggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>
</body>
</html>
