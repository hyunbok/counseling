<!DOCTYPE html>
<html lang="ko" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화상 상담 — 상담사</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-gray-900 min-h-screen flex flex-col">

  <!-- Top Bar -->
  <header class="bg-gray-800 border-b border-gray-700 px-4 py-2 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
      </div>
      <div>
        <h1 class="text-sm font-semibold text-gray-100">화상 상담</h1>
        <p class="text-xs text-gray-400">고객: 홍길동 &middot; 일반 상담</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <span class="inline-flex items-center gap-1.5 text-xs text-green-400">
        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
        연결됨
      </span>
      <span class="text-xs text-gray-400 font-mono">15:32</span>
      <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-red-900/50 text-red-400 border border-red-800">
        <span class="w-1.5 h-1.5 bg-red-400 rounded-full animate-pulse"></span>
        녹화 중
      </span>
    </div>
  </header>

  <!-- Main Content -->
  <div class="flex-1 flex overflow-hidden">

    <!-- Video Area -->
    <div class="flex-1 relative bg-gray-900 flex items-center justify-center">
      <!-- Remote Video (Customer) -->
      <div class="w-full h-full bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center">
        <div class="text-center">
          <div class="w-24 h-24 bg-gray-700 rounded-full flex items-center justify-center mx-auto mb-3">
            <svg class="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <p class="text-gray-400 text-sm">홍길동 고객</p>
        </div>
      </div>

      <!-- Local Video (Self - PiP) -->
      <div class="absolute bottom-4 right-4 w-48 h-36 bg-gray-800 rounded-xl border-2 border-gray-600 overflow-hidden shadow-lg">
        <div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-gray-700 to-gray-800">
          <div class="text-center">
            <div class="w-12 h-12 bg-gray-600 rounded-full flex items-center justify-center mx-auto mb-1">
              <span class="text-sm font-medium text-gray-300">나</span>
            </div>
            <p class="text-gray-500 text-xs">김상담</p>
          </div>
        </div>
      </div>

      <!-- Media Controls -->
      <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-gray-800/90 backdrop-blur-sm rounded-full px-5 py-3 border border-gray-700">
        <!-- Mic -->
        <button class="w-10 h-10 rounded-full bg-gray-700 hover:bg-gray-600 flex items-center justify-center text-gray-200 transition-colors" title="마이크">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
        </button>
        <!-- Camera -->
        <button class="w-10 h-10 rounded-full bg-gray-700 hover:bg-gray-600 flex items-center justify-center text-gray-200 transition-colors" title="카메라">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        </button>
        <!-- Screen Share -->
        <button class="w-10 h-10 rounded-full bg-gray-700 hover:bg-gray-600 flex items-center justify-center text-gray-200 transition-colors" title="화면 공유">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </button>
        <!-- Capture -->
        <button class="w-10 h-10 rounded-full bg-gray-700 hover:bg-gray-600 flex items-center justify-center text-gray-200 transition-colors" title="화면 캡처">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <!-- End -->
        <button class="w-12 h-10 rounded-full bg-red-600 hover:bg-red-700 flex items-center justify-center text-white transition-colors ml-1" title="상담 종료">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"/></svg>
        </button>
      </div>
    </div>

    <!-- Side Panel with Tabs -->
    <div class="w-96 bg-gray-800 border-l border-gray-700 flex flex-col shrink-0 hidden lg:flex">
      <!-- Tabs -->
      <div class="flex border-b border-gray-700">
        <button class="tab-btn flex-1 px-3 py-3 text-xs font-medium text-indigo-400 border-b-2 border-indigo-400" data-tab="chat">채팅</button>
        <button class="tab-btn flex-1 px-3 py-3 text-xs font-medium text-gray-400 hover:text-gray-200 border-b-2 border-transparent" data-tab="note">메모</button>
        <button class="tab-btn flex-1 px-3 py-3 text-xs font-medium text-gray-400 hover:text-gray-200 border-b-2 border-transparent" data-tab="file">파일</button>
        <button class="tab-btn flex-1 px-3 py-3 text-xs font-medium text-gray-400 hover:text-gray-200 border-b-2 border-transparent" data-tab="doc">문서</button>
      </div>

      <!-- Tab: Chat -->
      <div id="tab-chat" class="tab-panel flex-1 flex flex-col">
        <div class="flex-1 overflow-y-auto p-4 space-y-3">
          <div class="flex gap-2 justify-end">
            <div>
              <div class="bg-indigo-600 rounded-lg rounded-tr-none px-3 py-2">
                <p class="text-sm text-white">안녕하세요, 무엇을 도와드릴까요?</p>
              </div>
              <p class="text-xs text-gray-500 text-right mt-0.5">15:20</p>
            </div>
          </div>
          <div class="flex gap-2">
            <div class="w-7 h-7 bg-gray-600 rounded-full flex items-center justify-center shrink-0">
              <span class="text-xs text-gray-300 font-medium">홍</span>
            </div>
            <div>
              <p class="text-xs text-gray-400 mb-0.5">홍길동</p>
              <div class="bg-gray-700 rounded-lg rounded-tl-none px-3 py-2">
                <p class="text-sm text-gray-200">네, 계약 관련 문의가 있습니다.</p>
              </div>
            </div>
          </div>
        </div>
        <div class="p-3 border-t border-gray-700">
          <div class="flex gap-2">
            <input type="text" placeholder="메시지를 입력하세요..." class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" />
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-3 py-2 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Tab: Note -->
      <div id="tab-note" class="tab-panel flex-1 flex-col hidden">
        <div class="p-4 flex-1">
          <textarea placeholder="상담 메모를 작성하세요..." class="w-full h-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-3 text-sm text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none"></textarea>
        </div>
        <div class="p-3 border-t border-gray-700">
          <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg px-3 py-2 transition-colors">메모 저장</button>
        </div>
      </div>

      <!-- Tab: File -->
      <div id="tab-file" class="tab-panel flex-1 flex-col hidden">
        <div class="p-4 flex-1">
          <div class="border-2 border-dashed border-gray-600 rounded-lg p-8 text-center">
            <svg class="w-10 h-10 text-gray-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            <p class="text-sm text-gray-400 mb-2">파일을 드래그하거나 클릭하여 업로드</p>
            <p class="text-xs text-gray-500">최대 50MB</p>
          </div>
        </div>
      </div>

      <!-- Tab: Doc -->
      <div id="tab-doc" class="tab-panel flex-1 flex-col hidden">
        <div class="p-4 space-y-3">
          <p class="text-sm text-gray-400">고객과 공유할 문서를 선택하세요</p>
          <div class="space-y-2">
            <div class="bg-gray-700 rounded-lg p-3 flex items-center gap-3 cursor-pointer hover:bg-gray-600 transition-colors">
              <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
              <div>
                <p class="text-sm text-gray-200">서비스 이용약관.pdf</p>
                <p class="text-xs text-gray-500">2.3 MB</p>
              </div>
            </div>
            <div class="bg-gray-700 rounded-lg p-3 flex items-center gap-3 cursor-pointer hover:bg-gray-600 transition-colors">
              <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
              <div>
                <p class="text-sm text-gray-200">계약서 양식.docx</p>
                <p class="text-xs text-gray-500">1.1 MB</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('text-indigo-400', 'border-indigo-400'); b.classList.add('text-gray-400', 'border-transparent'); });
        btn.classList.remove('text-gray-400', 'border-transparent'); btn.classList.add('text-indigo-400', 'border-indigo-400');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
        const panel = document.getElementById('tab-' + btn.dataset.tab);
        panel.classList.remove('hidden'); panel.classList.add('flex');
      });
    });
  </script>
</body>
</html>
