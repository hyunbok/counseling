<!DOCTYPE html>
<html lang="ko" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화상 상담 — 고객</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-gray-900 min-h-screen flex flex-col">

  <!-- Top Bar -->
  <header class="bg-gray-800 border-b border-gray-700 px-4 py-2 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
      </div>
      <div>
        <h1 class="text-sm font-semibold text-gray-100">화상 상담 진행 중</h1>
        <p class="text-xs text-gray-400">상담사: 김상담</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="inline-flex items-center gap-1.5 text-xs text-green-400">
        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
        연결됨
      </span>
      <span class="text-xs text-gray-400 font-mono">12:34</span>
    </div>
  </header>

  <!-- Main Content -->
  <div class="flex-1 flex overflow-hidden">

    <!-- Video Area -->
    <div class="flex-1 relative bg-gray-900 flex items-center justify-center">
      <!-- Remote Video (Agent) -->
      <div class="w-full h-full bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center">
        <div class="text-center">
          <div class="w-24 h-24 bg-gray-700 rounded-full flex items-center justify-center mx-auto mb-3">
            <svg class="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <p class="text-gray-400 text-sm">김상담 상담사</p>
        </div>
      </div>

      <!-- Local Video (Self - PiP) -->
      <div class="absolute bottom-4 right-4 w-48 h-36 bg-gray-800 rounded-xl border-2 border-gray-600 overflow-hidden shadow-lg">
        <div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-gray-700 to-gray-800">
          <div class="text-center">
            <div class="w-12 h-12 bg-gray-600 rounded-full flex items-center justify-center mx-auto mb-1">
              <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <p class="text-gray-500 text-xs">나</p>
          </div>
        </div>
      </div>

      <!-- Media Controls -->
      <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-3 bg-gray-800/90 backdrop-blur-sm rounded-full px-6 py-3 border border-gray-700">
        <!-- Mic Toggle -->
        <button class="w-10 h-10 rounded-full bg-gray-700 hover:bg-gray-600 flex items-center justify-center text-gray-200 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
        </button>
        <!-- Camera Toggle -->
        <button class="w-10 h-10 rounded-full bg-gray-700 hover:bg-gray-600 flex items-center justify-center text-gray-200 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        </button>
        <!-- End Call -->
        <button class="w-12 h-10 rounded-full bg-red-600 hover:bg-red-700 flex items-center justify-center text-white transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"/></svg>
        </button>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="w-80 bg-gray-800 border-l border-gray-700 flex flex-col shrink-0 hidden md:flex">
      <!-- Chat Header -->
      <div class="px-4 py-3 border-b border-gray-700">
        <h2 class="text-sm font-semibold text-gray-200">채팅</h2>
      </div>

      <!-- Chat Messages -->
      <div class="flex-1 overflow-y-auto p-4 space-y-3">
        <!-- Agent Message -->
        <div class="flex gap-2">
          <div class="w-7 h-7 bg-indigo-600 rounded-full flex items-center justify-center shrink-0">
            <span class="text-xs text-white font-medium">김</span>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-0.5">김상담</p>
            <div class="bg-gray-700 rounded-lg rounded-tl-none px-3 py-2">
              <p class="text-sm text-gray-200">안녕하세요, 무엇을 도와드릴까요?</p>
            </div>
          </div>
        </div>

        <!-- Customer Message -->
        <div class="flex gap-2 justify-end">
          <div>
            <div class="bg-indigo-600 rounded-lg rounded-tr-none px-3 py-2">
              <p class="text-sm text-white">네, 계약 관련 문의가 있습니다.</p>
            </div>
            <p class="text-xs text-gray-500 text-right mt-0.5">12:30</p>
          </div>
        </div>

        <!-- Agent Message -->
        <div class="flex gap-2">
          <div class="w-7 h-7 bg-indigo-600 rounded-full flex items-center justify-center shrink-0">
            <span class="text-xs text-white font-medium">김</span>
          </div>
          <div>
            <p class="text-xs text-gray-400 mb-0.5">김상담</p>
            <div class="bg-gray-700 rounded-lg rounded-tl-none px-3 py-2">
              <p class="text-sm text-gray-200">네, 말씀해 주세요. 어떤 계약 건인지 확인해 드리겠습니다.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Chat Input -->
      <div class="p-3 border-t border-gray-700">
        <div class="flex gap-2">
          <input type="text" placeholder="메시지를 입력하세요..." class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" />
          <button class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-3 py-2 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
