<!DOCTYPE html>
<html lang="ko" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드 — 상담사</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-200">

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col shrink-0">
      <!-- Logo -->
      <div class="p-4 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          </div>
          <span class="font-semibold text-gray-900 dark:text-gray-100">화상 상담</span>
        </div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 p-3 space-y-1">
        <a href="agent-dashboard.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 text-sm font-medium">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2 2z"/></svg>
          대시보드
        </a>
        <a href="agent-history.html" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700/50 text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          상담 이력
        </a>
      </nav>

      <!-- User Info -->
      <div class="p-3 border-t border-gray-200 dark:border-gray-700">
        <div class="flex items-center gap-3 px-3 py-2">
          <div class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/50 rounded-full flex items-center justify-center">
            <span class="text-xs font-semibold text-indigo-600 dark:text-indigo-400">김</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate">김상담</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">기술지원팀</p>
          </div>
          <!-- Dark Toggle -->
          <button id="darkToggle" class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
            <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <svg class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto">
      <!-- Top Bar -->
      <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-4">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-xl font-bold text-gray-900 dark:text-gray-100">대시보드</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">오늘의 상담 현황</p>
          </div>

          <!-- Agent Status -->
          <div class="flex items-center gap-3">
            <span class="text-sm text-gray-500 dark:text-gray-400">상태:</span>
            <div class="relative">
              <select id="agentStatus" class="appearance-none bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-300 text-sm font-medium rounded-full pl-7 pr-8 py-1.5 focus:ring-2 focus:ring-green-500 outline-none cursor-pointer">
                <option value="online">온라인</option>
                <option value="away">자리비움</option>
                <option value="wrapup">후처리중</option>
                <option value="offline">오프라인</option>
              </select>
              <span class="absolute left-2.5 top-1/2 -translate-y-1/2 w-2 h-2 bg-green-500 rounded-full" id="statusDot"></span>
              <svg class="absolute right-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-green-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>
        </div>
      </header>

      <div class="p-6 space-y-6">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              </div>
              <p class="text-sm text-gray-500 dark:text-gray-400">오늘 상담 건수</p>
            </div>
            <p class="text-2xl font-bold text-gray-900 dark:text-gray-100">12</p>
          </div>

          <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 bg-green-50 dark:bg-green-900/30 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              </div>
              <p class="text-sm text-gray-500 dark:text-gray-400">평균 상담 시간</p>
            </div>
            <p class="text-2xl font-bold text-gray-900 dark:text-gray-100">18<span class="text-base font-normal text-gray-500 dark:text-gray-400">분</span></p>
          </div>

          <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 bg-amber-50 dark:bg-amber-900/30 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-amber-600 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
              </div>
              <p class="text-sm text-gray-500 dark:text-gray-400">평균 만족도</p>
            </div>
            <p class="text-2xl font-bold text-gray-900 dark:text-gray-100">4.5<span class="text-base font-normal text-gray-500 dark:text-gray-400">/5</span></p>
          </div>
        </div>

        <!-- Queue Section -->
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700">
          <div class="px-5 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <h2 class="text-base font-semibold text-gray-900 dark:text-gray-100">대기열</h2>
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400">3명 대기</span>
            </div>
          </div>
          <div class="divide-y divide-gray-100 dark:divide-gray-700">
            <!-- Queue Item 1 -->
            <div class="px-5 py-3 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center">
                  <span class="text-sm font-medium text-gray-600 dark:text-gray-300">홍</span>
                </div>
                <div>
                  <p class="text-sm font-medium text-gray-900 dark:text-gray-100">홍길동</p>
                  <p class="text-xs text-gray-500 dark:text-gray-400">일반 상담 &middot; 대기 2분</p>
                </div>
              </div>
              <button class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg px-3 py-1.5 transition-colors">
                수락
              </button>
            </div>
            <!-- Queue Item 2 -->
            <div class="px-5 py-3 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center">
                  <span class="text-sm font-medium text-gray-600 dark:text-gray-300">이</span>
                </div>
                <div>
                  <p class="text-sm font-medium text-gray-900 dark:text-gray-100">이영희</p>
                  <p class="text-xs text-gray-500 dark:text-gray-400">기술 지원 &middot; 대기 5분</p>
                </div>
              </div>
              <button class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg px-3 py-1.5 transition-colors">
                수락
              </button>
            </div>
            <!-- Queue Item 3 -->
            <div class="px-5 py-3 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center">
                  <span class="text-sm font-medium text-gray-600 dark:text-gray-300">박</span>
                </div>
                <div>
                  <p class="text-sm font-medium text-gray-900 dark:text-gray-100">박민수</p>
                  <p class="text-xs text-gray-500 dark:text-gray-400">계약 문의 &middot; 대기 8분</p>
                </div>
              </div>
              <button class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg px-3 py-1.5 transition-colors">
                수락
              </button>
            </div>
          </div>
        </div>

        <!-- Recent Sessions -->
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700">
          <div class="px-5 py-4 border-b border-gray-200 dark:border-gray-700">
            <h2 class="text-base font-semibold text-gray-900 dark:text-gray-100">최근 상담</h2>
          </div>
          <div class="divide-y divide-gray-100 dark:divide-gray-700">
            <div class="px-5 py-3 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <div>
                  <p class="text-sm font-medium text-gray-900 dark:text-gray-100">최진수</p>
                  <p class="text-xs text-gray-500 dark:text-gray-400">일반 상담 &middot; 22분 &middot; 오늘 14:30</p>
                </div>
              </div>
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400">완료</span>
            </div>
            <div class="px-5 py-3 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <div>
                  <p class="text-sm font-medium text-gray-900 dark:text-gray-100">정미영</p>
                  <p class="text-xs text-gray-500 dark:text-gray-400">기술 지원 &middot; 15분 &middot; 오늘 13:45</p>
                </div>
              </div>
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400">완료</span>
            </div>
            <div class="px-5 py-3 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <div>
                  <p class="text-sm font-medium text-gray-900 dark:text-gray-100">강민호</p>
                  <p class="text-xs text-gray-500 dark:text-gray-400">계약 문의 &middot; 30분 &middot; 오늘 11:20</p>
                </div>
              </div>
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400">완료</span>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    const toggle = document.getElementById('darkToggle');
    const html = document.documentElement;
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
    }
    toggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    });

    // Status color
    const statusColors = { online: 'green', away: 'amber', wrapup: 'purple', offline: 'gray' };
    const sel = document.getElementById('agentStatus');
    const dot = document.getElementById('statusDot');
    sel.addEventListener('change', () => {
      const c = statusColors[sel.value] || 'gray';
      dot.className = `absolute left-2.5 top-1/2 -translate-y-1/2 w-2 h-2 bg-${c}-500 rounded-full`;
    });
  </script>
</body>
</html>
