spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.r2dbc.autoconfigure.R2dbcAutoConfiguration
      - org.springframework.boot.r2dbc.autoconfigure.R2dbcTransactionManagerAutoConfiguration
      - org.springframework.boot.data.r2dbc.autoconfigure.DataR2dbcAutoConfiguration
      - org.springframework.boot.data.r2dbc.autoconfigure.DataR2dbcRepositoriesAutoConfiguration
      - org.springframework.boot.mongodb.autoconfigure.MongoReactiveAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveRepositoriesAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
jwt:
  secret: test-secret-key-for-jwt-signing-must-be-at-least-256-bits-long-for-hmac-sha256
  access-expiration: 3600000
  refresh-expiration: 604800000

livekit:
  url: ws://localhost:7880
  api-key: test-api-key
  api-secret: test-api-secret
  token-ttl-seconds: 3600

recording:
  base-path: /tmp/test-recordings
  file-format: mp4

file-storage:
  base-path: /tmp/test-shared-files
  max-file-size: 10485760

capture-storage:
  base-path: /tmp/test-screen-captures
  max-file-size: 10485760
