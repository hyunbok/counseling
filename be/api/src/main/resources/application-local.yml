spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/meta_db
    username: admin
    password: admin
    pool:
      initial-size: 5
      max-size: 20
  data:
    mongodb:
      uri: mongodb://localhost:27017/counseling_read
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 50
          max-idle: 25
          min-idle: 5

cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3100

livekit:
  url: ${LIVEKIT_URL:http://localhost:7880}
  api-key: ${LIVEKIT_API_KEY:devkey}
  api-secret: ${LIVEKIT_API_SECRET:secret}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-change-in-production-min-256-bits}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
