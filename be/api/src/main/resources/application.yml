server:
  port: 8080

spring:
  application:
    name: counseling-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      lettuce:
        pool:
          max-active: 50
          max-idle: 25
          min-idle: 5
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
  webflux:
    multipart:
      max-in-memory-size: 10485760
      max-disk-usage-per-part: 10485760
      max-parts: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.counseling.api: DEBUG

livekit:
  url: ${LIVEKIT_URL:http://localhost:7880}
  api-key: ${LIVEKIT_API_KEY:devkey}
  api-secret: ${LIVEKIT_API_SECRET:secret}
  token-ttl-seconds: ${LIVEKIT_TOKEN_TTL_SECONDS:3600}

recording:
  base-path: ${RECORDING_BASE_PATH:/tmp/recordings}
  file-format: ${RECORDING_FILE_FORMAT:mp4}

file-storage:
  base-path: ${FILE_STORAGE_BASE_PATH:/tmp/shared-files}
  max-file-size: ${FILE_STORAGE_MAX_SIZE:10485760}

capture-storage:
  base-path: ${CAPTURE_STORAGE_BASE_PATH:/tmp/screen-captures}
  max-file-size: ${CAPTURE_STORAGE_MAX_SIZE:10485760}

notification:
  mail-from: ${NOTIFICATION_MAIL_FROM:noreply@counseling.com}
