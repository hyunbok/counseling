# =============================================================================
# LiveKit Server — Local Development Configuration
# =============================================================================
# This config is mounted read-only into the LiveKit container.
# Do NOT use these settings in production.
# =============================================================================

port: 7880

rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: false

keys:
  devkey: secret

logging:
  level: info

room:
  auto_create: true
  empty_timeout: 300       # 5 minutes
  max_participants: 20

webhook: {}

turn:
  enabled: false
